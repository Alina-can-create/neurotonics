<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" width="400" height="520">
  <defs>
    <!-- Bottle body gradient -->
    <linearGradient id="bottleBody" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="20%" stop-color="#2a2a40"/>
      <stop offset="50%" stop-color="#3a3a55"/>
      <stop offset="80%" stop-color="#2a2a40"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <!-- Cap gradient -->
    <linearGradient id="capGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="40%" stop-color="#2d2d3d"/>
      <stop offset="60%" stop-color="#3d3d50"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <!-- Label gradient - rich purple/blue -->
    <linearGradient id="labelGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="30%" stop-color="#283593"/>
      <stop offset="50%" stop-color="#3949ab"/>
      <stop offset="70%" stop-color="#283593"/>
      <stop offset="100%" stop-color="#1a237e"/>
    </linearGradient>
    <!-- Label side darkening -->
    <linearGradient id="labelShadow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.5"/>
      <stop offset="15%" stop-color="#000000" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="85%" stop-color="#000000" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.5"/>
    </linearGradient>
    <!-- Pink stripe gradient -->
    <linearGradient id="pinkStripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9c27b0" stop-opacity="0.3"/>
      <stop offset="30%" stop-color="#e91e8c"/>
      <stop offset="50%" stop-color="#ff4fc8"/>
      <stop offset="70%" stop-color="#e91e8c"/>
      <stop offset="100%" stop-color="#9c27b0" stop-opacity="0.3"/>
    </linearGradient>
    <!-- Blue stripe gradient -->
    <linearGradient id="blueStripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00bcd4" stop-opacity="0.3"/>
      <stop offset="30%" stop-color="#00e5ff"/>
      <stop offset="50%" stop-color="#80ffff"/>
      <stop offset="70%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#00bcd4" stop-opacity="0.3"/>
    </linearGradient>
    <!-- Bottle shine -->
    <linearGradient id="bottleShine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="25%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="35%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- 1000 badge gradient -->
    <linearGradient id="badgeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7b1fa2"/>
      <stop offset="100%" stop-color="#4a148c"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Brain glow filter -->
    <filter id="brainGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Drop shadow -->
    <filter id="shadow" x="-20%" y="0%" width="140%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="15" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <!-- Cap clip -->
    <clipPath id="capClip">
      <rect x="120" y="20" width="160" height="70" rx="8"/>
    </clipPath>
    <!-- Label clip -->
    <clipPath id="labelClip">
      <rect x="65" y="105" width="270" height="330" rx="2"/>
    </clipPath>
    <!-- Bottle clip -->
    <clipPath id="bottleClip">
      <path d="M120,20 L280,20 L285,90 Q295,105 295,120 L295,430 Q295,460 270,470 L130,470 Q105,460 105,430 L105,120 Q105,105 115,90 Z"/>
    </clipPath>
  </defs>

  <!-- Drop shadow behind bottle -->
  <ellipse cx="200" cy="490" rx="85" ry="14" fill="#000000" opacity="0.25"/>

  <!-- ===== BOTTLE BODY ===== -->
  <g filter="url(#shadow)">
    <!-- Main bottle shape -->
    <path d="M120,20 L280,20 L285,90 Q295,105 295,120 L295,430 Q295,460 270,470 L130,470 Q105,460 105,430 L105,120 Q105,105 115,90 Z"
          fill="url(#bottleBody)"/>

    <!-- ===== CAP ===== -->
    <rect x="118" y="18" width="164" height="72" rx="9" fill="url(#capGrad)"/>
    <!-- Cap top highlight line -->
    <rect x="118" y="18" width="164" height="4" rx="2" fill="#ffffff" opacity="0.15"/>
    <!-- Cap bottom edge -->
    <rect x="115" y="85" width="170" height="6" rx="1" fill="#0a0a14"/>
    <!-- Cap grip lines -->
    <g opacity="0.12" fill="#ffffff">
      <rect x="125" y="28" width="2" height="52" rx="1"/>
      <rect x="133" y="28" width="2" height="52" rx="1"/>
      <rect x="141" y="28" width="2" height="52" rx="1"/>
      <rect x="149" y="28" width="2" height="52" rx="1"/>
      <rect x="157" y="28" width="2" height="52" rx="1"/>
      <rect x="165" y="28" width="2" height="52" rx="1"/>
      <rect x="173" y="28" width="2" height="52" rx="1"/>
      <rect x="181" y="28" width="2" height="52" rx="1"/>
      <rect x="189" y="28" width="2" height="52" rx="1"/>
      <rect x="197" y="28" width="2" height="52" rx="1"/>
      <rect x="205" y="28" width="2" height="52" rx="1"/>
      <rect x="213" y="28" width="2" height="52" rx="1"/>
      <rect x="221" y="28" width="2" height="52" rx="1"/>
      <rect x="229" y="28" width="2" height="52" rx="1"/>
      <rect x="237" y="28" width="2" height="52" rx="1"/>
      <rect x="245" y="28" width="2" height="52" rx="1"/>
      <rect x="253" y="28" width="2" height="52" rx="1"/>
      <rect x="261" y="28" width="2" height="52" rx="1"/>
      <rect x="269" y="28" width="2" height="52" rx="1"/>
      <rect x="277" y="28" width="2" height="52" rx="1"/>
    </g>
    <!-- Cap shine -->
    <path d="M140,22 Q200,15 260,22 L265,50 Q200,43 135,50 Z" fill="#ffffff" opacity="0.08"/>

    <!-- ===== LABEL BACKGROUND ===== -->
    <rect x="65" y="103" width="270" height="335" fill="url(#labelGrad)" clip-path="url(#labelClip)"/>

    <!-- Label content group (clipped to label area) -->
    <g clip-path="url(#labelClip)">

      <!-- Pink/magenta top accent stripe -->
      <rect x="65" y="103" width="270" height="5" fill="url(#pinkStripe)"/>

      <!-- Cyan/blue second accent stripe -->
      <rect x="65" y="108" width="270" height="2.5" fill="url(#blueStripe)" opacity="0.8"/>

      <!-- Neural network brain graphic (right side, glowing) -->
      <g opacity="0.55" filter="url(#brainGlow)">
        <!-- Brain outline shape -->
        <ellipse cx="272" cy="210" rx="45" ry="48" fill="none" stroke="#00e5ff" stroke-width="1.2" opacity="0.6"/>
        <!-- Brain internal lines (stylized neural network) -->
        <circle cx="272" cy="210" r="3" fill="#00e5ff" opacity="0.9"/>
        <circle cx="250" cy="195" r="2" fill="#00e5ff" opacity="0.7"/>
        <circle cx="294" cy="195" r="2" fill="#00e5ff" opacity="0.7"/>
        <circle cx="255" cy="225" r="2" fill="#00e5ff" opacity="0.7"/>
        <circle cx="290" cy="228" r="2" fill="#00e5ff" opacity="0.7"/>
        <circle cx="265" cy="242" r="2" fill="#00e5ff" opacity="0.7"/>
        <circle cx="282" cy="178" r="1.5" fill="#00e5ff" opacity="0.6"/>
        <circle cx="260" cy="170" r="1.5" fill="#00e5ff" opacity="0.6"/>
        <circle cx="300" cy="215" r="1.5" fill="#00e5ff" opacity="0.6"/>
        <circle cx="245" cy="210" r="1.5" fill="#00e5ff" opacity="0.6"/>
        <!-- Connection lines -->
        <line x1="272" y1="210" x2="250" y2="195" stroke="#00e5ff" stroke-width="0.8" opacity="0.5"/>
        <line x1="272" y1="210" x2="294" y2="195" stroke="#00e5ff" stroke-width="0.8" opacity="0.5"/>
        <line x1="272" y1="210" x2="255" y2="225" stroke="#00e5ff" stroke-width="0.8" opacity="0.5"/>
        <line x1="272" y1="210" x2="290" y2="228" stroke="#00e5ff" stroke-width="0.8" opacity="0.5"/>
        <line x1="272" y1="210" x2="265" y2="242" stroke="#00e5ff" stroke-width="0.8" opacity="0.5"/>
        <line x1="272" y1="210" x2="282" y2="178" stroke="#00e5ff" stroke-width="0.8" opacity="0.4"/>
        <line x1="272" y1="210" x2="300" y2="215" stroke="#00e5ff" stroke-width="0.8" opacity="0.4"/>
        <line x1="272" y1="210" x2="245" y2="210" stroke="#00e5ff" stroke-width="0.8" opacity="0.4"/>
        <line x1="250" y1="195" x2="260" y2="170" stroke="#00e5ff" stroke-width="0.6" opacity="0.3"/>
        <line x1="294" y1="195" x2="282" y2="178" stroke="#00e5ff" stroke-width="0.6" opacity="0.3"/>
        <line x1="255" y1="225" x2="265" y2="242" stroke="#00e5ff" stroke-width="0.6" opacity="0.3"/>
        <line x1="290" y1="228" x2="300" y2="215" stroke="#00e5ff" stroke-width="0.6" opacity="0.3"/>
        <!-- Outer glow dots -->
        <circle cx="240" cy="183" r="1.2" fill="#00e5ff" opacity="0.5"/>
        <circle cx="306" cy="200" r="1.2" fill="#00e5ff" opacity="0.5"/>
        <circle cx="278" cy="255" r="1.2" fill="#00e5ff" opacity="0.5"/>
        <line x1="240" y1="183" x2="250" y2="195" stroke="#00e5ff" stroke-width="0.5" opacity="0.3"/>
        <line x1="306" y1="200" x2="300" y2="215" stroke="#00e5ff" stroke-width="0.5" opacity="0.3"/>
        <line x1="278" y1="255" x2="265" y2="242" stroke="#00e5ff" stroke-width="0.5" opacity="0.3"/>
      </g>

      <!-- NEUROTONICS® brand name -->
      <text x="148" y="134" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="700"
            fill="#ffffff" letter-spacing="3" text-anchor="middle" opacity="0.95">NEUROTONICS®</text>

      <!-- Thin line under brand -->
      <line x1="80" y1="140" x2="215" y2="140" stroke="#ffffff" stroke-width="0.6" opacity="0.3"/>

      <!-- BRAIN text -->
      <text x="148" y="192" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="58" font-weight="900"
            fill="#ffffff" letter-spacing="-1" text-anchor="middle"
            style="paint-order: stroke; stroke: rgba(0,0,0,0.3); stroke-width: 3px;">BRAIN</text>

      <!-- BOOST text -->
      <text x="148" y="245" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="58" font-weight="900"
            fill="#ffffff" letter-spacing="-1" text-anchor="middle"
            style="paint-order: stroke; stroke: rgba(0,0,0,0.3); stroke-width: 3px;">BOOST</text>

      <!-- 1000 badge -->
      <rect x="88" y="253" width="120" height="38" rx="5" fill="url(#badgeGrad)"/>
      <rect x="88" y="253" width="120" height="38" rx="5" fill="none" stroke="#e040fb" stroke-width="1.5" opacity="0.7"/>
      <text x="148" y="279" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="26" font-weight="900"
            fill="#ffffff" letter-spacing="1" text-anchor="middle">1000</text>

      <!-- Divider line -->
      <line x1="80" y1="300" x2="320" y2="300" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>

      <!-- Three benefit icons row -->
      <!-- Icon 1: Brain Health -->
      <g transform="translate(95, 310)">
        <circle cx="0" cy="14" r="14" fill="none" stroke="#00e5ff" stroke-width="1.2" opacity="0.6"/>
        <!-- Brain icon -->
        <path d="M-5,12 Q-8,8 -5,5 Q-2,2 2,4 Q5,2 8,5 Q11,8 8,12 Q6,16 2,17 Q-2,16 -5,12Z"
              fill="none" stroke="#ffffff" stroke-width="1.3" opacity="0.9"/>
        <text x="0" y="36" font-family="Arial, Helvetica, sans-serif" font-size="5.5" font-weight="600"
              fill="#ffffff" text-anchor="middle" opacity="0.8" letter-spacing="0.3">SUPPORTS</text>
        <text x="0" y="43" font-family="Arial, Helvetica, sans-serif" font-size="5.5" font-weight="700"
              fill="#ffffff" text-anchor="middle" opacity="0.9" letter-spacing="0.3">BRAIN HEALTH</text>
      </g>

      <!-- Icon 2: Memory -->
      <g transform="translate(200, 310)">
        <circle cx="-52" cy="14" r="14" fill="none" stroke="#00e5ff" stroke-width="1.2" opacity="0.6"/>
        <!-- Memory/eye icon -->
        <ellipse cx="-52" cy="14" rx="6" ry="4" fill="none" stroke="#ffffff" stroke-width="1.3" opacity="0.9"/>
        <circle cx="-52" cy="14" r="2" fill="#ffffff" opacity="0.9"/>
        <text x="-52" y="36" font-family="Arial, Helvetica, sans-serif" font-size="5" font-weight="600"
              fill="#ffffff" text-anchor="middle" opacity="0.8" letter-spacing="0.2">HELPS INCREASE</text>
        <text x="-52" y="43" font-family="Arial, Helvetica, sans-serif" font-size="5" font-weight="700"
              fill="#ffffff" text-anchor="middle" opacity="0.9" letter-spacing="0.2">SHORT TERM MEMORY</text>
      </g>

      <!-- Icon 3: Focus -->
      <g transform="translate(305, 310)">
        <circle cx="-10" cy="14" r="14" fill="none" stroke="#00e5ff" stroke-width="1.2" opacity="0.6"/>
        <!-- Focus/target icon -->
        <circle cx="-10" cy="14" r="6" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.9"/>
        <circle cx="-10" cy="14" r="2.5" fill="#ffffff" opacity="0.9"/>
        <text x="-10" y="36" font-family="Arial, Helvetica, sans-serif" font-size="5.5" font-weight="600"
              fill="#ffffff" text-anchor="middle" opacity="0.8" letter-spacing="0.3">SUPPORTS</text>
        <text x="-10" y="43" font-family="Arial, Helvetica, sans-serif" font-size="5.5" font-weight="700"
              fill="#ffffff" text-anchor="middle" opacity="0.9" letter-spacing="0.3">MENTAL FOCUS</text>
      </g>

      <!-- Divider line -->
      <line x1="80" y1="367" x2="320" y2="367" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>

      <!-- 60 CAPSULES pill badge -->
      <rect x="152" y="372" width="96" height="20" rx="10" fill="#283593" stroke="#7986cb" stroke-width="1"/>
      <text x="200" y="385" font-family="Arial, Helvetica, sans-serif" font-size="8.5" font-weight="700"
            fill="#ffffff" text-anchor="middle" letter-spacing="0.5">
        <tspan font-size="10" font-weight="900">60</tspan> CAPSULES
      </text>

      <!-- Bottom text -->
      <text x="200" y="407" font-family="Arial, Helvetica, sans-serif" font-size="7" font-weight="600"
            fill="#ffffff" text-anchor="middle" opacity="0.8" letter-spacing="0.8">VEGAN FRIENDLY | GLUTEN FREE</text>
      <text x="200" y="418" font-family="Arial, Helvetica, sans-serif" font-size="7.5" font-weight="800"
            fill="#ffffff" text-anchor="middle" letter-spacing="1">NATURAL PRODUCT</text>

      <!-- Cyan bottom accent stripe -->
      <rect x="65" y="432" width="270" height="2.5" fill="url(#blueStripe)" opacity="0.8"/>

      <!-- Pink/magenta bottom accent stripe -->
      <rect x="65" y="434" width="270" height="4" fill="url(#pinkStripe)"/>

      <!-- Label shadow overlay (curved sides) -->
      <rect x="65" y="103" width="270" height="335" fill="url(#labelShadow)"/>
    </g>

    <!-- Bottle shine/highlight overlay -->
    <path d="M105,120 L105,430 Q105,455 130,468 L130,103 Q115,108 105,120 Z"
          fill="url(#bottleShine)" opacity="0.8"/>
    <!-- Right side shine -->
    <path d="M280,103 L280,468 Q294,455 295,430 L295,120 Q287,108 280,103 Z"
          fill="#000000" opacity="0.15"/>

    <!-- Bottom of bottle -->
    <ellipse cx="200" cy="465" rx="90" ry="10" fill="#111122"/>
    <ellipse cx="200" cy="463" rx="88" ry="8" fill="#1a1a2e"/>
  </g>
</svg>
